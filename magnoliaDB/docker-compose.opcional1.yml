services:
  db_magnolia_op1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magnolia_opcional1_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: u_magnolia
      POSTGRES_PASSWORD: m4gn0l14
      POSTGRES_DB: db_magnolia
    volumes:
      - magnolia_op1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U u_magnolia -d db_magnolia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  magnolia_op1_data:
